<!DOCTYPE html>
<html>
<head>
    <title>Add Result - ASMS</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg,#0d6efd,#6610f2);
            margin:0;
            padding:40px;
        }

        .container{
            width:500px;
            margin:50px auto;
            background:#fff;
            padding:30px;
            border-radius:15px;
            box-shadow:0 8px 20px rgba(0,0,0,0.2);
        }

        h2{
            text-align:center;
            color:#0d6efd;
            margin-bottom:25px;
        }

        label{
            font-weight:bold;
            color:#333;
        }

        input, select{
            width:100%;
            padding:10px;
            margin-top:5px;
            margin-bottom:15px;
            border:1px solid #ccc;
            border-radius:8px;
            box-sizing:border-box;
            font-size:15px;
        }

        input:focus,
        select:focus{
            outline:none;
            border-color:#0d6efd;
            box-shadow:0 0 5px rgba(13,110,253,.3);
        }

        button{
            width:100%;
            background:#198754;
            color:white;
            border:none;
            padding:12px;
            border-radius:8px;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#157347;
        }

        a{
            text-decoration:none;
            color:#0d6efd;
            font-weight:bold;
        }

        a:hover{
            color:#6610f2;
        }

        p{
            color:red;
            font-weight:bold;
        }
    </style>
</head>
<body>

<div class="container">

    <h2>Add Student Result</h2>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for message in messages %}
                <p style="color:red;">
                    {{ message }}
                </p>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST">

        <!-- SELECT STUDENT -->
        <label>Select Student</label><br>

        <select name="student_id" required>
            <option value="">-- Select Student --</option>

            {% for student in students %}
                <option value="{{ student[0] }}">
                    {{ student[1] }}
                </option>
            {% endfor %}
        </select>

        <!-- SELECT EXAM -->
        <label>Select Exam</label><br>

        <select name="exam_id" required>
            <option value="">-- Select Exam --</option>

            {% for exam in exams %}
                <option value="{{ exam[0] }}">
                    {{ exam[1] }}
                </option>
            {% endfor %}
        </select>

        <!-- SUBJECT -->
        <label>Subject</label><br>

        <input
            type="text"
            name="subject"
            placeholder="Enter Subject"
            required
        >

        <!-- MARKS -->
        <label>Marks</label><br>

        <input
            type="number"
            name="marks"
            min="0"
            max="100"
            placeholder="Enter Marks"
            required
        >

        <button type="submit">
            Save Result
        </button>

    </form>

    <br>

    <a href="/results">View Results</a>

</div>

</body>
</html>
