<!DOCTYPE html>
<html>
<head>
    <title>Add Student</title>
</head>
<body>

<h2>Add Student</h2>

<form method="POST">
    <input type="text" name="name" placeholder="Student Name" required><br><br>

    <select name="gender">
        <option>Male</option>
        <option>Female</option>
    </select><br><br>

    <input type="text" name="class" placeholder="Class (e.g. Form 1)" required><br><br>

    <input type="number" name="age" placeholder="Age" required><br><br>

    <input type="text" name="parent_contact" placeholder="Parent Contact" required><br><br>

    <button type="submit">Save Student</button>
</form>

<a href="/students">Back</a>

</body>
</html>
