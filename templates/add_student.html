<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Student - ASMS</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background: linear-gradient(135deg,#0d6efd,#6610f2);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .card{
            width:500px;
            border:none;
            border-radius:15px;
            box-shadow:0 10px 25px rgba(0,0,0,.2);
        }

        .card-header{
            background:#0d6efd;
            color:white;
            text-align:center;
            font-size:24px;
            font-weight:bold;
            border-radius:15px 15px 0 0 !important;
        }

        .btn-save{
            background:#198754;
            color:white;
        }

        .btn-save:hover{
            background:#157347;
        }

        .btn-back{
            background:#6c757d;
            color:white;
        }

        .btn-back:hover{
            background:#565e64;
        }
    </style>

</head>
<body>

<div class="card">

    <div class="card-header">
        🎓 Add New Student
    </div>

    <div class="card-body">

        <form method="POST">

            <div class="mb-3">
                <label class="form-label">Student Name</label>
                <input type="text" class="form-control" name="name" placeholder="Enter student name" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Gender</label>
                <select class="form-select" name="gender">
                    <option>Male</option>
                    <option>Female</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Class</label>
                <input type="text" class="form-control" name="class" placeholder="e.g Form 1" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Age</label>
                <input type="number" class="form-control" name="age" placeholder="Enter age" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Parent Contact</label>
                <input type="text" class="form-control" name="parent_contact" placeholder="Parent phone number" required>
            </div>

            <div class="d-grid gap-2">
                <button class="btn btn-save" type="submit">
                    💾 Save Student
                </button>

                <a href="/students" class="btn btn-back">
                    ← Back to Students
                </a>
            </div>

        </form>

    </div>

</div>

</body>
</html>
