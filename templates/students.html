<!DOCTYPE html>
<html>
<head>
    <title>Students</title>
</head>
<body>

<h2>Students List</h2>

<a href="/add_student">Add Student</a>

<table border="1" cellpadding="10">
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Gender</th>
        <th>Class</th>
        <th>Age</th>
        <th>Parent Contact</th>
        <th>Actions</th>
    </tr>

    {% for s in students %}
    <tr>
        <td>{{ s[0] }}</td>
        <td>{{ s[1] }}</td>
        <td>{{ s[2] }}</td>
        <td>{{ s[3] }}</td>
        <td>{{ s[4] }}</td>
        <td>{{ s[5] }}</td>
        <td>
            <a href="/edit_student/{{ s[0] }}">Edit</a>
            <a href="/delete_student/{{ s[0] }}" onclick="return confirm('Delete student?')">Delete</a>
        </td>
    </tr>
    {% endfor %}

</table>

</body>
</html>
