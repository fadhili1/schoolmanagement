<!DOCTYPE html>
<html>
<head>
    <title>Exams - ASMS</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg,#0d6efd,#6610f2);
            margin:0;
            padding:40px;
        }

        .container{
            width:95%;
            margin:auto;
            background:#fff;
            padding:30px;
            border-radius:15px;
            box-shadow:0 8px 20px rgba(0,0,0,0.2);
        }

        h2{
            text-align:center;
            color:#0d6efd;
            margin-bottom:20px;
        }

        .btn{
            display:inline-block;
            background:#198754;
            color:white;
            padding:10px 18px;
            text-decoration:none;
            border-radius:8px;
            margin-bottom:20px;
            font-weight:bold;
        }

        .btn:hover{
            background:#157347;
        }

        table{
            width:100%;
            border-collapse:collapse;
        }

        th{
            background:#0d6efd;
            color:white;
            padding:12px;
        }

        td{
            padding:10px;
            border:1px solid #ddd;
            text-align:center;
        }

        tr:nth-child(even){
            background:#f8f9fa;
        }

        tr:hover{
            background:#e9ecef;
        }

        .edit{
            color:#0d6efd;
            font-weight:bold;
            text-decoration:none;
        }

        .delete{
            color:#dc3545;
            font-weight:bold;
            text-decoration:none;
        }

        .edit:hover{
            color:#6610f2;
        }

        .delete:hover{
            color:#b02a37;
        }
    </style>
</head>
<body>

<div class="container">

<h2>📝 Exams List</h2>

<a href="/add_exam" class="btn">➕ Add Exam</a>

<table>

<tr>
    <th>ID</th>
    <th>Exam Name</th>
    <th>Date</th>
    <th>Class</th>
    <th>Actions</th>
</tr>

{% for exam in exams %}
<tr>
    <td>{{ exam[0] }}</td>
    <td>{{ exam[1] }}</td>
    <td>{{ exam[2] }}</td>
    <td>{{ exam[3] }}</td>

    <td>
        <a class="edit" href="/edit_exam/{{ exam[0] }}">✏ Edit</a>
        |
        <a class="delete" href="/delete_exam/{{ exam[0] }}" onclick="return confirm('Delete Exam?')">🗑 Delete</a>
    </td>

</tr>
{% endfor %}

</table>

</div>

</body>
</html>
