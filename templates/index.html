<!DOCTYPE html>
<html>
<head>
    <title>ASMS Home</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #141e30, #243b55);
            color: white;
            text-align: center;
            padding-top: 90px;
        }

        .card {
            background: white;
            color: black;
            width: 420px;
            margin: auto;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.3);
        }

        a {
            display: inline-block;
            margin: 10px;
            padding: 10px 20px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
        }

        .login {
            background: green;
            color: white;
        }

        .register {
            background: blue;
            color: white;
        }
    </style>

</head>
<body>

    <h1>🏫 Advanced School Management System</h1>
    <p>Welcome to ASMS Portal</p>

    <div class="card">

        <h2>Get Started</h2>

        <a class="login" href="/login">Login</a>
        <a class="register" href="/register">Register</a>

    </div>

</body>
</html>
