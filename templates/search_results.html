<!DOCTYPE html>
<html>
<head>
    <title>Search Results - ASMS</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg,#0d6efd,#6610f2);
            margin:0;
            padding:40px;
        }

        .container{
            width:95%;
            margin:auto;
            background:#fff;
            padding:30px;
            border-radius:15px;
            box-shadow:0 8px 20px rgba(0,0,0,0.2);
        }

        h2{
            text-align:center;
            color:#0d6efd;
            margin-bottom:20px;
        }

        form{
            text-align:center;
            margin-bottom:20px;
        }

        input{
            width:60%;
            padding:10px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:15px;
        }

        button{
            padding:10px 15px;
            background:#0d6efd;
            color:white;
            border:none;
            border-radius:8px;
            cursor:pointer;
            font-weight:bold;
        }

        button:hover{
            background:#6610f2;
        }

        table{
            width:100%;
            border-collapse:collapse;
        }

        th{
            background:#0d6efd;
            color:white;
            padding:12px;
        }

        td{
            padding:10px;
            border:1px solid #ddd;
            text-align:center;
        }

        tr:nth-child(even){
            background:#f8f9fa;
        }

        tr:hover{
            background:#e9ecef;
        }

        a{
            display:inline-block;
            margin-top:15px;
            text-decoration:none;
            color:#0d6efd;
            font-weight:bold;
        }

        a:hover{
            color:#6610f2;
        }
    </style>
</head>
<body>

<div class="container">

<h2>🔍 Search Student Results</h2>

<form method="POST">
    <input type="text" name="keyword" placeholder="Search student / exam / subject" required>
    <button type="submit">Search</button>
</form>

<table>

    <tr>
        <th>Student</th>
        <th>Exam</th>
        <th>Subject</th>
        <th>Marks</th>
        <th>Grade</th>
    </tr>

    {% for r in results %}
    <tr>
        <td>{{ r[1] }}</td>
        <td>{{ r[2] }}</td>
        <td>{{ r[3] }}</td>
        <td>{{ r[4] }}</td>
        <td>{{ r[5] }}</td>
    </tr>
    {% endfor %}

</table>

<br>
<a href="/results">⬅ Back to Results</a>

</div>

</body>
</html>
