<!DOCTYPE html>
<html>
<head>
    <title>Results</title>
</head>
<body>

<h2>Students Results</h2>

<a href="/add_result">Add Result</a>

<table border="1">

<tr>
    <th>ID</th>
    <th>Student</th>
    <th>Exam</th>
    <th>Subject</th>
    <th>Marks</th>
    <th>Grade</th>
</tr>

{% for result in results %}
<tr>
    <td>{{ result[0] }}</td>
    <td>{{ result[1] }}</td>
    <td>{{ result[2] }}</td>
    <td>{{ result[3] }}</td>
    <td>{{ result[4] }}</td>
    <td>{{ result[5] }}</td>
</tr>
{% endfor %}

</table>

</body>
</html>
