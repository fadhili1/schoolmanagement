<!DOCTYPE html>
<html>
<head>
    <title>Results - ASMS</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg,#0d6efd,#6610f2);
            margin:0;
            padding:40px;
        }

        .container{
            width:95%;
            margin:auto;
            background:#fff;
            padding:30px;
            border-radius:15px;
            box-shadow:0 8px 20px rgba(0,0,0,0.2);
        }

        h2{
            text-align:center;
            color:#0d6efd;
            margin-bottom:20px;
        }

        .btn{
            display:inline-block;
            background:#198754;
            color:white;
            padding:10px 18px;
            text-decoration:none;
            border-radius:8px;
            margin-bottom:20px;
            font-weight:bold;
        }

        .btn:hover{
            background:#157347;
        }

        table{
            width:100%;
            border-collapse:collapse;
        }

        th{
            background:#0d6efd;
            color:white;
            padding:12px;
        }

        td{
            padding:10px;
            border:1px solid #ddd;
            text-align:center;
        }

        tr:nth-child(even){
            background:#f8f9fa;
        }

        tr:hover{
            background:#e9ecef;
        }
    </style>
</head>
<body>

<div class="container">

<h2>📊 Students Results</h2>

<a href="/add_result" class="btn">➕ Add Result</a>

<table>

<tr>
    <th>ID</th>
    <th>Student</th>
    <th>Exam</th>
    <th>Subject</th>
    <th>Marks</th>
    <th>Grade</th>
</tr>

{% for result in results %}
<tr>
    <td>{{ result[0] }}</td>
    <td>{{ result[1] }}</td>
    <td>{{ result[2] }}</td>
    <td>{{ result[3] }}</td>
    <td>{{ result[4] }}</td>
    <td>{{ result[5] }}</td>
</tr>
{% endfor %}

</table>

</div>

</body>
</html>
