<!DOCTYPE html>
<html>
<head>
    <title>Login - ASMS</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg,#0d6efd,#6610f2);
            margin:0;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            width:380px;
            background:#fff;
            padding:30px;
            border-radius:15px;
            box-shadow:0 8px 20px rgba(0,0,0,0.2);
        }

        h2{
            text-align:center;
            color:#0d6efd;
            margin-bottom:10px;
        }

        p{
            text-align:center;
            color:#666;
            margin-bottom:25px;
        }

        input{
            width:100%;
            padding:12px;
            margin-bottom:15px;
            border:1px solid #ccc;
            border-radius:8px;
            box-sizing:border-box;
            font-size:15px;
        }

        input:focus{
            outline:none;
            border-color:#0d6efd;
            box-shadow:0 0 5px rgba(13,110,253,.3);
        }

        button{
            width:100%;
            background:#198754;
            color:white;
            border:none;
            padding:12px;
            border-radius:8px;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#157347;
        }

        a{
            display:block;
            text-align:center;
            margin-top:20px;
            text-decoration:none;
            color:#0d6efd;
            font-weight:bold;
        }

        a:hover{
            color:#6610f2;
        }
    </style>
</head>
<body>

<div class="container">

    <h2>🎓 ASMS Login</h2>

    <p>Advanced School Management System</p>

    <form method="POST">
        <input type="text" name="username" placeholder="Username" required>

        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">🔐 Login</button>
    </form>

    <a href="/register">Create Account</a>

</div>

</body>
</html>
