<!DOCTYPE html>
<html>
<head>
    <title>Results Analytics - ASMS</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body{
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg,#0d6efd,#6610f2);
            margin:0;
            padding:40px;
        }

        .container{
            width:90%;
            margin:auto;
            background:#fff;
            padding:30px;
            border-radius:15px;
            box-shadow:0 8px 20px rgba(0,0,0,0.2);
            text-align:center;
        }

        h2{
            color:#0d6efd;
            margin-bottom:20px;
        }

        canvas{
            max-width:100%;
            margin-top:20px;
        }

        a{
            display:inline-block;
            margin-top:20px;
            text-decoration:none;
            color:#0d6efd;
            font-weight:bold;
        }

        a:hover{
            color:#6610f2;
        }
    </style>
</head>

<body>

<div class="container">

<h2>📊 Results Analytics Dashboard</h2>

<canvas id="resultsChart" width="400" height="200"></canvas>

<script>
const ctx = document.getElementById('resultsChart');

new Chart(ctx, {
    type: 'bar',
    data: {
        labels: ['Grade A', 'Grade B', 'Grade C', 'Grade F'],
        datasets: [{
            label: 'Number of Students',
            data: [
                {{ grade_a }},
                {{ grade_b }},
                {{ grade_c }},
                {{ grade_f }}
            ],
            backgroundColor: [
                '#198754',
                '#0d6efd',
                '#fd7e14',
                '#dc3545'
            ]
        }]
    },
    options: {
        responsive: true,
        scales: {
            y: {
                beginAtZero: true
            }
        }
    }
});
</script>

<a href="/dashboard">⬅ Back to Dashboard</a>

</div>

</body>
</html>
