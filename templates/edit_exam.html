<!DOCTYPE html>
<html>
<head>
    <title>Edit Exam - ASMS</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg,#0d6efd,#6610f2);
            margin:0;
            padding:40px;
        }

        .container{
            width:500px;
            margin:50px auto;
            background:#fff;
            padding:30px;
            border-radius:15px;
            box-shadow:0 8px 20px rgba(0,0,0,0.2);
        }

        h2{
            text-align:center;
            color:#0d6efd;
            margin-bottom:20px;
        }

        label{
            font-weight:bold;
            color:#333;
        }

        input{
            width:100%;
            padding:10px;
            margin-top:5px;
            margin-bottom:15px;
            border:1px solid #ccc;
            border-radius:8px;
            box-sizing:border-box;
            font-size:15px;
        }

        input:focus{
            outline:none;
            border-color:#0d6efd;
            box-shadow:0 0 5px rgba(13,110,253,.3);
        }

        button{
            width:100%;
            background:#198754;
            color:white;
            border:none;
            padding:12px;
            border-radius:8px;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#157347;
        }

        a{
            display:block;
            text-align:center;
            margin-top:15px;
            text-decoration:none;
            color:#0d6efd;
            font-weight:bold;
        }

        a:hover{
            color:#6610f2;
        }
    </style>
</head>
<body>

<div class="container">

    <h2>✏ Edit Exam</h2>

    <form method="POST">

        <label>Exam Name</label>
        <input type="text" name="exam_name" value="{{ exam[1] }}" required>

        <label>Exam Date</label>
        <input type="date" name="exam_date" value="{{ exam[2] }}" required>

        <label>Class</label>
        <input type="text" name="class_name" value="{{ exam[3] }}" required>

        <button type="submit">⬆ Update Exam</button>

    </form>

    <a href="/exams">← Back</a>

</div>

</body>
</html>
