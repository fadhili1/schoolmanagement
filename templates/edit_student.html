<!DOCTYPE html>
<html>
<head>
    <title>Edit Student</title>
</head>
<body>

<h2>Edit Student</h2>

<form method="POST">

    <input type="text" name="name" value="{{ student[1] }}"><br><br>

    <input type="text" name="gender" value="{{ student[2] }}"><br><br>

    <input type="text" name="class" value="{{ student[3] }}"><br><br>

    <input type="number" name="age" value="{{ student[4] }}"><br><br>

    <input type="text" name="parent_contact" value="{{ student[5] }}"><br><br>

    <button type="submit">Update</button>

</form>

<a href="/students">Back</a>

</body>
</html>
