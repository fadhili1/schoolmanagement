<!DOCTYPE html>
<html>
<head>
    <title>Add Exam</title>
</head>
<body>

<h2>Add Exam</h2>

<form method="POST">

    <input type="text"
           name="exam_name"
           placeholder="Exam Name" required><br><br>

    <input type="date"
           name="exam_date" required><br><br>

    <input type="text"
           name="class_name"
           placeholder="Class" required><br><br>

    <button type="submit">Save Exam</button>

</form>

</body>
</html>
